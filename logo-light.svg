<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 790 100" width="790" height="100">
  <!-- Top chevron (darkest red) -->
  <polyline points="10,42 55,12 100,42" fill="none" stroke="#B71C1C" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Middle chevron (hot pink) -->
  <polyline points="10,63 55,33 100,63" fill="none" stroke="#E91E63" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom chevron (light pink) -->
  <polyline points="10,84 55,54 100,84" fill="none" stroke="#F48FB1" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "Lift" -->
  <text x="118" y="78" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="62" fill="#ffffff">Lift</text>

  <!-- Red dot above the 'i' in Lift -->
  <circle cx="162" cy="20" r="6" fill="#B71C1C"/>

  <!-- "INTERNATIONAL" same height as Lift -->
  <text x="232" y="78" font-family="Arial, sans-serif" font-weight="700" font-size="62" fill="#ffffff">INTERNATIONAL</text>
</svg>
